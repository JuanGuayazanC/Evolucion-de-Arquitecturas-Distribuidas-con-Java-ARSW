syntax = "proto3";

option java_multiple_files = true;
option java_package = "grpc.movie";
option java_outer_classname = "MovieProto";

// Servicio de consulta de películas.
service MovieService {
  // Obtiene una película por su ID.
  rpc GetMovie (MovieRequest) returns (MovieResponse);
}

// Petición: contiene el ID de la película buscada.
message MovieRequest {
  int32 id = 1;
}

// Respuesta: datos de la película encontrada.
message MovieResponse {
  int32 id = 1;
  string title = 2;
  string director = 3;
  int32 year = 4;
  bool found = 5;
}
